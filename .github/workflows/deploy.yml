name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static files (Injects secrets into static JS)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_LEMON_SQUEEZY_STORE_URL: ${{ secrets.VITE_LEMON_SQUEEZY_STORE_URL }}
          VITE_LEMON_SQUEEZY_PRO_VARIANT_ID: ${{ secrets.VITE_LEMON_SQUEEZY_PRO_VARIANT_ID }}
          VITE_LEMON_SQUEEZY_CREDITS_VARIANT_ID: ${{ secrets.VITE_LEMON_SQUEEZY_CREDITS_VARIANT_ID }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: f710e9176e6bf246d6228c4e720bbe53
          command: pages deploy dist --project-name=pixelisolate
